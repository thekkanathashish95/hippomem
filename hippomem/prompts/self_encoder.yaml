# Self extraction prompts — extract self-signals not already captured in the trait profile
# Placeholders use {name} syntax; literal braces in JSON use {{ and }}.

operations:
  extract_self_candidates:
    system: |
      You extract durable self-signals from the USER's message that are NEW or CHANGED
      relative to their existing trait profile.

      You are given:
      - The user's current message
      - Recent conversation context (prior turns)
      - The user's existing active trait table (category | key: value, seen Nx)

      Your task: Return ONLY traits that are either:
        (a) not yet present in the existing table, OR
        (b) present but with a value that has meaningfully changed

      Do NOT return traits already well-captured in the profile. Most turns will produce
      an empty result — that is correct and expected.

      Trait categories:
        stable_attribute — occupation, skills, location, background, health context, or any
                           other factual, durable fact about the user that does not fit a
                           more specific category below. This is the broad catch-all for
                           identity facts.
        goal             — long-term career, product, or life goals
        personality      — consistent ways of thinking or approaching problems
        preference       — format, communication style, depth preferences, and explicit
                           directives about how the AI should interact with this user
                           (e.g. "never greet me with good morning", "always use tabs")
        constraint       — structural limits (time, environment, employment)
        project          — the user's active long-running initiatives
        social           — durable relationships with named people in the user's life:
                           spouse/partner, close family, mentor, close friend, key long-term
                           colleague. Capture only relationships the user clearly has an
                           ongoing, meaningful connection to. Key examples: spouse, partner,
                           parent, sibling, mentor, best_friend. Do NOT capture passing
                           mentions of acquaintances or colleagues named only once.

      ── Confidence tiers — READ CAREFULLY ───────────────────────────────────────────────

      confidence_estimate reflects how certain you are that this trait is durable and
      accurately captures what the user expressed. Use the following tiers:

      HIGH (0.8–1.0) — assign when the signal is:
        - Explicitly and unambiguously stated by the user ("I'm a cardiologist",
          "I don't like bullet points", "I think from first principles")
        - An explicit directive the user wants the AI to follow ("never greet me with
          good morning", "always show code examples", "remember I use dark mode")
        - A core identity fact that would meaningfully change how an AI responds to
          this person in almost every session
        Examples: occupation, strong communication preferences, explicitly stated
        goals, "remember" / "always" / "never" instructions

      MEDIUM (0.6–0.8) — assign when the signal is:
        - Clearly implied but not directly stated ("seems to work late hours" from
          context clues, "appears to prefer brevity" from response patterns)
        - Stated once with mild uncertainty or hedging
        - Relevant but not mission-critical for every interaction
        Examples: inferred preferences, goals mentioned in passing, soft personality signals

      Do NOT return a candidate below 0.6 — if you are that uncertain, omit it entirely.

      ── Explicit user instructions ────────────────────────────────────────────────────

      If the user uses language like "remember", "always", "never", "make sure you",
      or "don't forget" — this is an explicit memory directive. Always assign
      confidence_estimate = 0.9 regardless of how it is phrased. These are stated facts,
      not inferences. Map them to the most appropriate category (usually preference).

      ── Merging rule — CRITICAL ──────────────────────────────────────────────────────

      When returning a CHANGED trait (case b above), the value you return must be the
      COMPLETE, FINAL content — not just the new addition. Read the existing value,
      integrate the new signal into it, and return the full merged result.

      WRONG: existing = "concise with bullet points", new signal = "also wants code examples"
             → returning "with code examples"  ← loses original
      RIGHT: → returning "concise with bullet points and code examples"

      WRONG: existing = "building hippomem as primary side project", new signal = "also consulting"
             → returning "also consulting for a startup"  ← loses original
      RIGHT: → returning "building hippomem as primary side project; consulting for early-stage startup"

      ── Extraction quality rules ─────────────────────────────────────────────────────

      - Only extract when the signal is durable, substantial, and clearly stated or
        strongly implied — not incidental.
      - Do NOT extract from: one-off emotional states, session-specific context,
        vague or uncertain language, or anything the assistant said.
      - Do NOT force an extraction just because the user mentioned something interesting.
        If you are not confident a trait is genuinely durable, return nothing.
      - For projects: capture only the user's RELATIONSHIP to the project
        (e.g. "building hippomem as my primary side project"). Do NOT capture
        technical facts about the project itself — those belong in entity memory.

      For the key field: use snake_case. Reuse existing keys when the signal
      matches the same attribute. Only create a new key for a genuinely new dimension.

      Prefer traits that would meaningfully change how an AI communicates with or helps
      this person. "Prefers technical depth over simplified explanations" is highly
      relevant. "Currently working on hippomem as primary project" shapes every
      engineering question they might ask. "Has a young child" might explain time
      constraints. Traits that are durable but would not affect how you'd respond to
      this person are lower priority.

    user_template: |
      Existing traits for this user:
      <existing_traits>
      {existing_traits_block}
      </existing_traits>

      Recent conversation context:
      <recent_turns>
      {recent_turns}
      </recent_turns>

      <user_message>
      {user_message}
      </user_message>

      Extract ONLY traits that are missing from or changed in the existing profile.
      Return an empty candidates list if nothing new or changed is found — this is the expected output for most turns.

      Return JSON in exactly this structure:
      {{
        "candidates": [
          {{
            "category": "stable_attribute|goal|personality|preference|constraint|project|social",
            "key": "snake_case_key",
            "value": "the complete, final trait content (merged if updating an existing trait)",
            "confidence_estimate": 0.0
          }}
        ]
      }}
